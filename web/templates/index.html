<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MNIST Digit Recognizer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: Georgia, serif;
    background: #fff;
    color: #333;
    display: flex;
    justify-content: center;
    padding: 24px;
  }
  .container { max-width: 700px; width: 100%; text-align: center; }
  h1 { font-size: 1.6rem; font-weight: normal; color: #2c3e50; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #999; margin-bottom: 18px; }

  /* ── canvas wrapper: white background ─────────────────── */
  .canvas-wrapper {
    display: inline-block;
    border: 2px solid #bbb;
    border-radius: 8px;
    overflow: hidden;
    background: #fff;
    line-height: 0;
  }
  canvas.draw-area {
    display: block;
    width: 280px;
    height: 280px;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: crosshair;
    touch-action: none;
  }

  /* ── controls ─────────────────────────────────────────── */
  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
    align-items: center;
    margin-top: 14px;
  }
  .prediction-box {
    display: inline-block;
    min-width: 56px;
    height: 56px;
    line-height: 56px;
    border: 3px solid #3498db;
    border-radius: 8px;
    background: #fff;
    font-size: 2rem;
    font-family: 'Courier New', Courier, monospace;
    color: #2c3e50;
    vertical-align: middle;
    transition: all 0.2s;
    padding: 0 6px;
  }
  .prediction-box .conf {
    font-size: 0.65rem;
    color: #999;
    display: block;
    line-height: 0;
    margin-top: -12px;
  }
  button {
    font-size: 0.85rem;
    padding: 7px 18px;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  button:hover { background: #f0f0f0; }
  button.primary {
    background: #3498db;
    color: #fff;
    border-color: #2980b9;
  }
  button.primary:hover { background: #2980b9; }

  /* ── probability bars ─────────────────────────────────── */
  .prob-section {
    display: flex;
    gap: 4px;
    justify-content: center;
    margin-top: 12px;
    height: 56px;
    align-items: flex-end;
  }
  .prob-col {
    text-align: center;
    width: 24px;
  }
  .prob-bar {
    width: 100%;
    background: #e0e0e0;
    border-radius: 2px 2px 0 0;
    transition: height 0.3s, background 0.3s;
  }
  .prob-bar.top { background: #e74c3c; }
  .prob-dig { font-size: 0.7rem; color: #999; margin-top: 2px; }

  /* ── history ───────────────────────────────────────────── */
  .history-section {
    margin-top: 24px;
    text-align: left;
  }
  .history-section h3 {
    font-size: 0.9rem;
    font-weight: normal;
    color: #888;
    margin-bottom: 8px;
  }
  .history-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }
  .history-item {
    position: relative;
    width: 44px;
    height: 44px;
    border: 1px solid #ddd;
    cursor: pointer;
  }
  .history-item:hover { border-color: #3498db; }
  .history-item canvas {
    width: 100%; height: 100%;
    image-rendering: pixelated;
  }
  .history-item .label-tag {
    position: absolute;
    bottom: 0; right: 1px;
    font-size: 0.5rem;
    color: #e74c3c;
    background: rgba(255,255,255,0.9);
    padding: 0 2px;
  }
  .download-link {
    margin-top: 8px;
    font-size: 0.75rem;
  }
  .download-link a { color: #3498db; text-decoration: none; }
  .download-link a:hover { text-decoration: underline; }
</style>
</head>
<body>
<div class="container">
  <h1>MNIST Digit Recognizer</h1>
  <p class="subtitle">Draw a digit &mdash; C++ CNN classifies it</p>

  <!-- drawing canvas: logical 28x28, displayed 280x280 via CSS pixelated scaling -->
  <div class="canvas-wrapper">
    <canvas id="canvas" class="draw-area" width="28" height="28"></canvas>
  </div>

  <div class="controls">
    <button class="primary" onclick="doPredict()">Classify</button>
    <div class="prediction-box" id="predBox">?</div>
    <button onclick="clearAll()">Clear</button>
  </div>

  <div class="prob-section" id="probSection"></div>

  <div class="history-section">
    <h3>History <span style="color:#ccc;font-size:0.7rem">(click thumbnail to label)</span></h3>
    <div class="history-grid" id="historyGrid"></div>
    <div class="download-link"><a href="#" onclick="downloadCSV()">Download as CSV</a></div>
  </div>
</div>

<script>
// ── pixel canvas (28x28 logical) ─────────────────────────
const W = 28, H = 28;
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });

// pixel grid: true = black, false = white
const grid = new Uint8Array(W * H);

function renderGrid() {
  const img = ctx.createImageData(W, H);
  for (let i = 0; i < W * H; i++) {
    const v = grid[i] ? 0 : 255;
    img.data[i * 4] = v;
    img.data[i * 4 + 1] = v;
    img.data[i * 4 + 2] = v;
    img.data[i * 4 + 3] = 255;
  }
  ctx.putImageData(img, 0, 0);
}

function clearAll() {
  grid.fill(0);
  renderGrid();
  document.getElementById('predBox').innerHTML = '?';
  document.getElementById('probSection').innerHTML = '';
}

// brush: paint a 2×2 block of pixels centered at (cx, cy)
function paint(cx, cy) {
  const x0 = Math.max(0, cx - 1), x1 = Math.min(W - 1, cx);
  const y0 = Math.max(0, cy - 1), y1 = Math.min(H - 1, cy);
  for (let y = y0; y <= y1; y++)
    for (let x = x0; x <= x1; x++)
      grid[y * W + x] = 1;
  renderGrid();
}

// ── mouse / touch events ─────────────────────────────────
function canvasPos(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: Math.floor((e.clientX - r.left) / r.width * W),
    y: Math.floor((e.clientY - r.top) / r.height * H)
  };
}
function touchPos(e) {
  const r = canvas.getBoundingClientRect();
  return {
    x: Math.floor((e.touches[0].clientX - r.left) / r.width * W),
    y: Math.floor((e.touches[0].clientY - r.top) / r.height * H)
  };
}

let drawing = false;
canvas.addEventListener('mousedown', e => { drawing = true; const p = canvasPos(e); paint(p.x, p.y); });
canvas.addEventListener('mousemove', e => { if (drawing) { const p = canvasPos(e); paint(p.x, p.y); } });
canvas.addEventListener('mouseup', () => drawing = false);
canvas.addEventListener('mouseleave', () => drawing = false);
canvas.addEventListener('touchstart', e => { e.preventDefault(); drawing = true; const p = touchPos(e); paint(p.x, p.y); });
canvas.addEventListener('touchmove', e => { e.preventDefault(); if (drawing) { const p = touchPos(e); paint(p.x, p.y); } });
canvas.addEventListener('touchend', () => drawing = false);

// get 784 grayscale values (0-255, black=255 white=0 — MNIST convention)
function getPixels() {
  const px = new Array(784);
  for (let i = 0; i < 784; i++) px[i] = grid[i] ? 255 : 0;
  return px;
}

// ── predict ──────────────────────────────────────────────
async function doPredict() {
  const px = getPixels();
  const resp = await fetch('/predict', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pixels: px })
  });
  const r = await resp.json();
  if (r.error) { alert(r.error); return; }

  const box = document.getElementById('predBox');
  const conf = (r.probs[r.digit] * 100).toFixed(1);
  box.innerHTML = r.digit + '<span class="conf">' + conf + '%</span>';

  // probability bars
  let html = '';
  for (let i = 0; i < 10; i++) {
    const h = Math.max(2, (r.probs[i] || 0) * 54);
    html += `<div class="prob-col">
      <div class="prob-bar${i === r.digit ? ' top' : ''}" style="height:${h}px"></div>
      <div class="prob-dig">${i}</div>
    </div>`;
  }
  document.getElementById('probSection').innerHTML = html;

  // add to history
  addToHistory(px);
}

// ── history ───────────────────────────────────────────────
let history = [];

function addToHistory(px) {
  history.push({ label: null, pixels: px.slice() });
  renderHistory();
}

function renderHistory() {
  const gridEl = document.getElementById('historyGrid');
  gridEl.innerHTML = '';
  history.forEach((item, idx) => {
    const div = document.createElement('div');
    div.className = 'history-item';
    const mini = document.createElement('canvas');
    mini.width = 28; mini.height = 28;
    const mctx = mini.getContext('2d');
    const img = mctx.createImageData(28, 28);
    for (let i = 0; i < 784; i++) {
      const v = item.pixels[i];
      img.data[i * 4] = v;
      img.data[i * 4 + 1] = v;
      img.data[i * 4 + 2] = v;
      img.data[i * 4 + 3] = 255;
    }
    mctx.putImageData(img, 0, 0);
    div.appendChild(mini);
    if (item.label !== null) {
      const tag = document.createElement('span');
      tag.className = 'label-tag';
      tag.textContent = item.label;
      div.appendChild(tag);
    }
    div.onclick = () => {
      const lbl = prompt('Assign label (0-9):');
      if (lbl !== null && /^[0-9]$/.test(lbl)) {
        history[idx].label = parseInt(lbl);
        renderHistory();
      }
    };
    gridEl.appendChild(div);
  });
}

function downloadCSV() {
  const labeled = history.filter(h => h.label !== null);
  const items = labeled.length ? labeled : history;
  let csv = '';
  for (const item of items) {
    if (item.label !== null) csv += item.label + ',';
    csv += item.pixels.join(',') + '\n';
  }
  const blob = new Blob([csv], { type: 'text/csv' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'digits.csv';
  a.click(); URL.revokeObjectURL(url);
}

// init
renderGrid();
</script>
</body>
</html>
